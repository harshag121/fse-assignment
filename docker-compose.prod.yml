# Production docker-compose — builds production images (no hot-reload, no source mounts)
# Usage:
#   cp .env.example .env.prod
#   # fill in all values in .env.prod
#   REACT_APP_API_URL=http://YOUR_SERVER_IP:8000 docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-docappointment}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuser} -d ${POSTGRES_DB:-docappointment}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docuser}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-docappointment}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Set this to your server's public address, e.g. http://123.45.67.89:8000
        # or https://api.yourdomain.com
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
